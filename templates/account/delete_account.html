{% extends 'base.html' %}

{% block title %}Видалити акаунт — AgroRIA{% endblock %}

{% block extra_css %}
<style>
  .auth-card { max-width: 560px; margin: 40px auto; }
</style>
{% endblock %}

{% block content %}
  <div class="container auth-card">
    <div class="card p-4">
      <h3 class="mb-3 text-danger">Видалити акаунт</h3>
      <p>Цю дію неможливо скасувати. Ви дійсно хочете видалити свій акаунт?</p>
      <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger w-100 mb-3" type="submit">Так, видалити</button>
      </form>
      <p class="text-center"><a href="{% url 'account:profile' %}">Ні, повернутися</a></p>
    </div>
  </div>
{% endblock %}
